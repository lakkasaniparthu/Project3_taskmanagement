{% extends "base.html" %}

{% block title %}{{ form_title }} - Project Management App{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h2 mb-0">{{ form_title }}</h1>
        <a class="btn btn-outline-secondary" href="{{ url_for('tasks_list') }}">Back to Tasks</a>
      </div>

      <form class="bg-white border rounded p-4" method="post">
        <div class="mb-3">
          <label class="form-label" for="task_name">Task Name</label>
          <input
            class="form-control"
            id="task_name"
            name="task_name"
            type="text"
            value="{{ task_name }}"
            required
          >
        </div>

        <div class="mb-3">
          <label class="form-label" for="project_id">Project</label>
          <select class="form-select" id="project_id" name="project_id" required>
            {% for project in projects %}
              <option value="{{ project.project_id }}" {% if project.project_id == project_id %}selected{% endif %}>
                {{ project.project_name }}
              </option>
            {% endfor %}
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label" for="assigned_user_id">Assigned User</label>
          <select class="form-select" id="assigned_user_id" name="assigned_user_id" required>
            {% for user in users %}
              <option value="{{ user.user_id }}" {% if user.user_id == assigned_user_id %}selected{% endif %}>
                {{ user.full_name }}
              </option>
            {% endfor %}
          </select>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label" for="priority">Priority</label>
            <select class="form-select" id="priority" name="priority" required>
              {% for option in priorities %}
                <option value="{{ option }}" {% if option == priority %}selected{% endif %}>
                  {{ option }}
                </option>
              {% endfor %}
            </select>
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label" for="status">Status</label>
            <select class="form-select" id="status" name="status" required>
              {% for option in statuses %}
                <option value="{{ option }}" {% if option == status %}selected{% endif %}>
                  {{ option }}
                </option>
              {% endfor %}
            </select>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label" for="estimated_hours">Estimated Hours</label>
            <input
              class="form-control"
              id="estimated_hours"
              name="estimated_hours"
              type="number"
              min="0"
              step="0.25"
              value="{{ estimated_hours }}"
              required
            >
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label" for="actual_hours">Actual Hours</label>
            <input
              class="form-control"
              id="actual_hours"
              name="actual_hours"
              type="number"
              min="0"
              step="0.25"
              value="{{ actual_hours }}"
              required
            >
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-4">
            <label class="form-label" for="created_date">Created Date</label>
            <input
              class="form-control"
              id="created_date"
              name="created_date"
              type="date"
              value="{{ created_date }}"
              required
            >
          </div>

          <div class="col-md-6 mb-4">
            <label class="form-label" for="due_date">Due Date</label>
            <input
              class="form-control"
              id="due_date"
              name="due_date"
              type="date"
              value="{{ due_date }}"
            >
          </div>
        </div>

        <div class="d-flex gap-2">
          <button class="btn btn-primary" type="submit">Save Task</button>
          {% if task %}
            <a class="btn btn-outline-secondary" href="{{ url_for('tasks_detail', task_id=task.task_id) }}">Cancel</a>
          {% else %}
            <a class="btn btn-outline-secondary" href="{{ url_for('tasks_list') }}">Cancel</a>
          {% endif %}
        </div>
      </form>
    </div>
  </div>
{% endblock %}
