{% extends "base.html" %}

{% block title %}Home - Project Management App{% endblock %}

{% block content %}
  <section class="welcome-section text-center">
    <div class="emoji-badge mx-auto mb-3">📌</div>
    <h1 class="display-5 fw-semibold mb-3">Project Management App</h1>
    <p class="lead text-muted mb-4">
      A simple Flask foundation for managing projects and tasks.
    </p>
    <div class="d-flex flex-wrap justify-content-center gap-2 mt-4">
      <a class="btn btn-primary" href="{{ url_for('dashboard') }}">📊 View Dashboard</a>
      <a class="btn btn-outline-primary" href="{{ url_for('projects_list') }}">🗂️ View Projects</a>
      <a class="btn btn-outline-primary" href="{{ url_for('tasks_list') }}">✅ View Tasks</a>
    </div>
  </section>
{% endblock %}
