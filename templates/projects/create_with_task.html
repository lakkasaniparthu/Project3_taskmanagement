{% extends "base.html" %}

{% block title %}Create Project With First Task - Project Management App{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-lg-9">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h1 class="h2 mb-1">✨ Create Project With First Task</h1>
          <p class="text-muted mb-0">The project and task are saved together in one transaction.</p>
        </div>
        <a class="btn btn-outline-secondary" href="{{ url_for('projects_list') }}">Back to Projects</a>
      </div>

      <form class="bg-white border rounded p-4" method="post">
        <h2 class="h4 mb-3">🗂️ Project</h2>

        <div class="mb-3">
          <label class="form-label" for="project_name">Project Name</label>
          <input class="form-control" id="project_name" name="project_name" type="text" value="{{ project_name }}" required>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label" for="project_owner_id">Project Owner</label>
            <select class="form-select" id="project_owner_id" name="project_owner_id" required>
              {% for user in users %}
                <option value="{{ user.user_id }}" {% if user.user_id == project_owner_id %}selected{% endif %}>
                  {{ user.full_name }}
                </option>
              {% endfor %}
            </select>
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label" for="project_status">Project Status</label>
            <select class="form-select" id="project_status" name="project_status" required>
              {% for status in project_statuses %}
                <option value="{{ status }}" {% if status == project_status %}selected{% endif %}>{{ status }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <div class="row mb-4">
          <div class="col-md-6">
            <label class="form-label" for="project_start_date">Project Start Date</label>
            <input class="form-control" id="project_start_date" name="project_start_date" type="date" value="{{ project_start_date }}">
          </div>
          <div class="col-md-6">
            <label class="form-label" for="project_due_date">Project Due Date</label>
            <input class="form-control" id="project_due_date" name="project_due_date" type="date" value="{{ project_due_date }}">
          </div>
        </div>

        <hr class="my-4">
        <h2 class="h4 mb-3">✅ First Task</h2>

        <div class="mb-3">
          <label class="form-label" for="task_name">Task Name</label>
          <input class="form-control" id="task_name" name="task_name" type="text" value="{{ task_name }}" required>
        </div>

        <div class="mb-3">
          <label class="form-label" for="assigned_user_id">Assigned User</label>
          <select class="form-select" id="assigned_user_id" name="assigned_user_id" required>
            {% for user in users %}
              <option value="{{ user.user_id }}" {% if user.user_id == assigned_user_id %}selected{% endif %}>
                {{ user.full_name }}
              </option>
            {% endfor %}
          </select>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label" for="task_priority">Task Priority</label>
            <select class="form-select" id="task_priority" name="task_priority" required>
              {% for priority in task_priorities %}
                <option value="{{ priority }}" {% if priority == task_priority %}selected{% endif %}>{{ priority }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label" for="task_status">Task Status</label>
            <select class="form-select" id="task_status" name="task_status" required>
              {% for status in task_statuses %}
                <option value="{{ status }}" {% if status == task_status %}selected{% endif %}>{{ status }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label" for="estimated_hours">Estimated Hours</label>
            <input class="form-control" id="estimated_hours" name="estimated_hours" type="number" min="0" step="0.25" value="{{ estimated_hours }}" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label" for="actual_hours">Actual Hours</label>
            <input class="form-control" id="actual_hours" name="actual_hours" type="number" min="0" step="0.25" value="{{ actual_hours }}" required>
          </div>
        </div>

        <div class="row mb-4">
          <div class="col-md-6">
            <label class="form-label" for="task_created_date">Task Created Date</label>
            <input class="form-control" id="task_created_date" name="task_created_date" type="date" value="{{ task_created_date }}" required>
          </div>
          <div class="col-md-6">
            <label class="form-label" for="task_due_date">Task Due Date</label>
            <input class="form-control" id="task_due_date" name="task_due_date" type="date" value="{{ task_due_date }}">
          </div>
        </div>

        <div class="d-flex gap-2">
          <button class="btn btn-primary" type="submit">✨ Create Project And Task</button>
          <a class="btn btn-outline-secondary" href="{{ url_for('projects_list') }}">Cancel</a>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
