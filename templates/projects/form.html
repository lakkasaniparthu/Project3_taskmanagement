{% extends "base.html" %}

{% block title %}{{ form_title }} - Project Management App{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h2 mb-0">{{ form_title }}</h1>
        <a class="btn btn-outline-secondary" href="{{ url_for('projects_list') }}">Back to Projects</a>
      </div>

      <form class="bg-white border rounded p-4" method="post">
        <div class="mb-3">
          <label class="form-label" for="project_name">Project Name</label>
          <input
            class="form-control"
            id="project_name"
            name="project_name"
            type="text"
            value="{{ project_name }}"
            required
          >
        </div>

        <div class="mb-3">
          <label class="form-label" for="user_id">Project Owner</label>
          <select class="form-select" id="user_id" name="user_id" required>
            {% for user in users %}
              <option value="{{ user.user_id }}" {% if user.user_id == user_id %}selected{% endif %}>
                {{ user.full_name }}
              </option>
            {% endfor %}
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label" for="status">Status</label>
          <select class="form-select" id="status" name="status" required>
            {% for option in statuses %}
              <option value="{{ option }}" {% if option == status %}selected{% endif %}>
                {{ option }}
              </option>
            {% endfor %}
          </select>
        </div>

        <div class="row">
          <div class="col-md-6 mb-4">
            <label class="form-label" for="start_date">Start Date</label>
            <input
              class="form-control"
              id="start_date"
              name="start_date"
              type="date"
              value="{{ start_date }}"
            >
          </div>

          <div class="col-md-6 mb-4">
            <label class="form-label" for="due_date">Due Date</label>
            <input
              class="form-control"
              id="due_date"
              name="due_date"
              type="date"
              value="{{ due_date }}"
            >
          </div>
        </div>

        <div class="d-flex gap-2">
          <button class="btn btn-primary" type="submit">Save Project</button>
          {% if project %}
            <a class="btn btn-outline-secondary" href="{{ url_for('projects_detail', project_id=project.project_id) }}">Cancel</a>
          {% else %}
            <a class="btn btn-outline-secondary" href="{{ url_for('projects_list') }}">Cancel</a>
          {% endif %}
        </div>
      </form>
    </div>
  </div>
{% endblock %}
