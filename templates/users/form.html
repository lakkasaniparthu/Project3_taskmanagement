{% extends "base.html" %}

{% block title %}{{ form_title }} - Project Management App{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h2 mb-0">{{ form_title }}</h1>
        <a class="btn btn-outline-secondary" href="{{ url_for('users_list') }}">Back to Users</a>
      </div>

      <form class="bg-white border rounded p-4" method="post">
        <div class="mb-3">
          <label class="form-label" for="full_name">Full Name</label>
          <input
            class="form-control"
            id="full_name"
            name="full_name"
            type="text"
            value="{{ full_name }}"
            required
          >
        </div>

        <div class="mb-4">
          <label class="form-label" for="email">Email</label>
          <input
            class="form-control"
            id="email"
            name="email"
            type="email"
            value="{{ email }}"
            required
          >
        </div>

        <div class="d-flex gap-2">
          <button class="btn btn-primary" type="submit">Save User</button>
          {% if user %}
            <a class="btn btn-outline-secondary" href="{{ url_for('users_detail', user_id=user.user_id) }}">Cancel</a>
          {% else %}
            <a class="btn btn-outline-secondary" href="{{ url_for('users_list') }}">Cancel</a>
          {% endif %}
        </div>
      </form>
    </div>
  </div>
{% endblock %}
